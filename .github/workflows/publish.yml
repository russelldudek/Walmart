name: Publish candidate vision

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Expand campaign source
        if: hashFiles('campaign-source.part-*') != '' || hashFiles('campaign-source.zip.b64') != ''
        run: |
          if compgen -G 'campaign-source.part-*' > /dev/null; then
            cat campaign-source.part-* > /tmp/campaign-source.zip.b64
          else
            cp campaign-source.zip.b64 /tmp/campaign-source.zip.b64
          fi
          base64 --decode /tmp/campaign-source.zip.b64 > /tmp/campaign-source.zip
          unzip -o /tmp/campaign-source.zip -d .
          rm -f campaign-source.zip.b64 campaign-source.part-*
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install artifact tools
        run: |
          python -m pip install --upgrade pip
          pip install pillow playwright pypdf
          python -m playwright install --with-deps chromium
      - name: Build and audit artifacts
        run: |
          python scripts/build_artifacts.py
          python scripts/audit_public.py
      - name: Commit complete publication set
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Publish Walmart candidate campaign updates [skip ci]"
            git push
          fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
